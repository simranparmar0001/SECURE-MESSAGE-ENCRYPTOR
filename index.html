<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Message Encrypter</title>
    <link rel="stylesheet" href="style.css">
    <!-- CryptoJS Library for AES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

<div class="container">
    <h1>🔐 SECURE MESSAGE ENCRYPTOR</h1>

    <textarea id="inputText" placeholder="Enter your message here..."></textarea>
    <input type="text" id="key" placeholder="Enter secret key/password">

    <div class="buttons">
        <button onclick="encrypt()">Encrypt</button>
        <button onclick="decrypt()">Decrypt</button>
        <button onclick="copyText()">Copy</button>
        <button onclick="downloadText()">Download</button>
        <button onclick="toggleDarkMode()">Toggle Dark Mode</button>
    </div>

    <div class="output">
        <h3>Result:</h3>
        <textarea id="outputText" readonly></textarea>
    </div>

    <p id="charCount">Characters: 0</p>
</div>

<script src="script.js"></script>
</body>
</html>
